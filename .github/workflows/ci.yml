name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck install.sh bundle.sh

  install-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run install
        run: |
          bash install.sh --dry-run --claude-home /tmp/fake-claude
          # nothing should have been created in dry-run
          test ! -d /tmp/fake-claude/agents

      - name: Real install into temp claude-home
        run: |
          bash install.sh --claude-home /tmp/fake-claude

      - name: Verify deployed files
        run: |
          set -e
          expected_agents=(
            quality-architecture quality-code-quality quality-delivery
            quality-distributed quality-patterns quality-persistence
            quality-process quality-refactor quality-review
            quality-security-review quality-test-quality
          )
          for name in "${expected_agents[@]}"; do
            test -f "/tmp/fake-claude/agents/${name}.md" \
              || { echo "missing: ${name}.md"; exit 1; }
          done
          test -f /tmp/fake-claude/commands/quality.md \
            || { echo "missing: commands/quality.md"; exit 1; }

      - name: Verify token substitution
        run: |
          # No deployed file should still contain the literal placeholder
          if grep -RIn "__SKILLS_DIR__" /tmp/fake-claude/; then
            echo "found unsubstituted __SKILLS_DIR__ token"
            exit 1
          fi
          # And every deployed agent should reference the actual SKILLS_DIR
          # (which equals the checkout dir in CI)
          expected_path="$GITHUB_WORKSPACE"
          grep -l "$expected_path" /tmp/fake-claude/agents/quality-*.md > /dev/null \
            || { echo "no agent references $expected_path"; exit 1; }

      - name: Idempotency check
        run: |
          # Re-running install must produce no writes
          out="$(bash install.sh --claude-home /tmp/fake-claude)"
          echo "$out"
          if echo "$out" | grep -qE "^\s*installed "; then
            echo "second install was not a no-op"
            exit 1
          fi
          if echo "$out" | grep -qE "^\s*backed up "; then
            echo "second install created a backup (should have been unchanged)"
            exit 1
          fi

      - name: Bundle round-trip
        run: |
          # Live → bundle should also be a no-op against the freshly installed tree
          out="$(bash bundle.sh --claude-home /tmp/fake-claude --dry-run)"
          echo "$out"
          if echo "$out" | grep -qE "would update "; then
            echo "bundle round-trip is not a no-op"
            exit 1
          fi
